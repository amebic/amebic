name: Publish to NPM

on:
  push:
    tags:
      - "*-v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PACKAGE="${TAG%%-v*}"
          VERSION="${TAG##*-v}"
          echo "package=${PACKAGE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing @amebic/${PACKAGE}@${VERSION}"

      - name: Verify version match
        working-directory: packages/${{ steps.parse.outputs.package }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          [ "$PKG_VERSION" = "${{ steps.parse.outputs.version }}" ] || {
            echo "Version mismatch: tag has ${{ steps.parse.outputs.version }}, package.json has $PKG_VERSION"
            exit 1
          }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and test
        run: |
          bun run lint
          bun run format:check
          bun run test
          bun run build

      - name: Check already published
        id: check
        working-directory: packages/${{ steps.parse.outputs.package }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "$NAME@$VER" version 2>/dev/null || echo "")
          if [ -n "$PUBLISHED" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VER is already published"
          fi

      - name: Publish to npm
        if: steps.check.outputs.already_published != 'true'
        working-directory: packages/${{ steps.parse.outputs.package }}
        run: npm publish --access public --provenance
