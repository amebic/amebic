# DISABLED - Enable by removing the `if: false` line when ready
# This workflow runs tests on pull requests and pushes to main

name: CI

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]

jobs:
  test:
    # Remove this line to enable the workflow
    if: false
    
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Run linter
        run: bun run lint
      
      - name: Check formatting
        run: bun run format:check
      
      - name: Build packages
        run: bun run build
      
      - name: Run tests
        run: bun run test
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
